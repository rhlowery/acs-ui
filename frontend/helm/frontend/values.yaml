replicaCount: 1
image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []

config:
  # The base URL for the backend API (e.g., https://api.acs.example.com).
  # If this is left empty, the application will attempt to reach the backend
  # on the same host and port as the frontend browser application.
  acsBackendUrl: ""

# --- Deployment Scenario Examples ---

# [SCENARIO 1] Local development against a local backend
# Use this when running the frontend in Kubernetes but the backend on your laptop
# config:
#   acsBackendUrl: "http://localhost:8080"

# [SCENARIO 2] Ingress-based deployment
# Use this to expose the frontend to users via a standard Kubernetes Ingress.
# Make sure to update the 'host' field below with your actual domain name.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # Use annotations to configure your Ingress controller (e.g., for SSL/TLS)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: acs-ui.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  # Example TLS configuration:
  #  - secretName: acs-ui-tls
  #    hosts:
  #      - acs-ui.local